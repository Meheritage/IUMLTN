    <script type="text/javascript">
        //var input = document.querySelector('input');
        //input.addEventListener('change', fileUpload_ClientSelect);

        $(document).ready(function () {
            localStorage.setItem("SHAJAN_CAM_USERID", "1");
            if (localStorage.getItem("SHAJAN_CAM_USERID") == "" || localStorage.getItem("SHAJAN_CAM_USERID") == null ||
                localStorage.getItem("SHAJAN_CAM_USERID") == undefined)//
            {
                window.location = "login.html";
            }

            waitingDialog.show("Please Wait...", { dialogSize: 'sm', progressType: 'warning' });
            $("#btnFileDelete").css("display", "none");
            Get_ImageList_by_ImageType("gallery", "", "pnlImageLoad", "admin");
        });

        function btnFileDelete_ClientClick()//
        {
            var arr = [];
            $('input[type="checkbox"]:checked').each(function () {
                arr.push($(this).val());
            });

            if (arr.length <= 0)//
            {
                OpenAlertPopup("Select image(s) for delete.", "danger");
            }
            else//
            {
                $("#btnFileDelete").attr("disabled", "disabled");
                $("#btnFileDelete").html("<i class='fa fa-spinner fa-2x fa-spin'></i>");
                waitingDialog.show("Please Wait...", { dialogSize: 'sm', progressType: 'warning' });
                Delete_Selected_Images("gallery", "", "pnlImageLoad", "admin", arr.toString(), "btnFileDelete")
            }
        }

        function btnFileUpload_ClientClick()//
        {
            var fileUpload = $("#fileUpload").get(0);
            var files = fileUpload.files;

            if (files.length <= 0)//
            {
                OpenAlertPopup("Select image file(s) for upload.", "danger");
            }
            else//
            {
                $("#btnFileUpload").attr("disabled", "disabled");
                $("#btnFileUpload").html("<i class='fa fa-spinner fa-spin'></i>&nbsp;&nbsp;Please wait&nbsp;");
                waitingDialog.show("Please Wait...", { dialogSize: 'sm', progressType: 'warning' });
                Upload_Image_via_Service("gallery", files, "btnFileUpload", "", "pnlImageLoad", localStorage.getItem("SHAJAN_CAM_USERID"), "admin");
            }
        }
    </script>
